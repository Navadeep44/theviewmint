  <script type="text/javascript">
    (function loadOtpScript(urls) {
        let i = 0;
        function attempt() {
            const s = document.createElement('script');
            s.src = urls[i];
            s.async = true;
            s.onerror = () => {
                i++;
                if (i < urls.length) {
                    attempt();
                }
            };
            document.head.appendChild(s);
        }
        attempt();
    })([
        'https://verify.msg91.com/otp-provider.js',
        'https://verify.phone91.com/otp-provider.js'
    ]);
